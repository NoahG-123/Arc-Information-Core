name: ARC Daily Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install google-generativeai
          npm install -g @anthropic-ai/claude-code
          npm install --save-dev @babel/core @babel/cli @babel/preset-react

      - name: Configure git
        run: |
          git config user.name "ARC Update Bot"
          git config user.email "arc-bot@users.noreply.github.com"

      - name: Run ARC update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            --system-prompt "$(cat arc-update-context.md)" \
            "$(cat arc-update-task.md)"

      - name: Compile tracker.jsx to tracker.js
        run: npx babel tracker.jsx --presets @babel/preset-react --out-file tracker.js

      - name: Push changes
        run: |
          git add tracker.jsx tracker.js arc-update-log.md arc-pending-stories.md 2>/dev/null || true
          git diff --staged --quiet || git commit -m "ARC update $(date +%Y-%m-%d)"
          git push origin main

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arc-log-${{ github.run_id }}
          path: arc-update-log.md
          retention-days: 30
