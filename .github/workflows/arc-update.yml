name: ARC Daily Update

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "ARC Update Bot"
          git config user.email "arc-bot@users.noreply.github.com"

      - name: Run ARC update
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            --system-prompt "$(cat arc-update-context.md)" \
            "$(cat arc-update-task.md)"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arc-log-${{ github.run_id }}
          path: arc-update-log.md
          retention-days: 30
