<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC Information Core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #09090d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel for JSX transpilation (client-side, acceptable for personal use) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- The tracker -->
  <script type="text/babel" src="tracker.jsx"></script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ARC));
  </script>
</body>
</html>
