<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC Information Core</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #09090d; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // Fetch tracker.jsx, strip the export default, and eval it with Babel
    fetch('tracker.jsx')
      .then(r => r.text())
      .then(src => {
        // Remove "export default" so it doesn't produce CommonJS exports
        const cleaned = src.replace(/export\s+default\s+function\s+ARC/, 'function ARC');
        const transformed = Babel.transform(cleaned, {
          presets: ['react'],
          plugins: []
        }).code;
        // eslint-disable-next-line no-eval
        eval(transformed);
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(ARC));
      })
      .catch(e => {
        document.getElementById('root').innerHTML =
          '<div style="color:#c94040;font-family:monospace;padding:40px">ERROR LOADING TRACKER: ' + e.message + '</div>';
      });
  </script>
</body>
</html>
